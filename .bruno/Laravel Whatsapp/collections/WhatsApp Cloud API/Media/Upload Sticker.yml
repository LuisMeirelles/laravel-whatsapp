info:
  name: Upload Sticker
  type: http
  seq: 2

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/media
  body:
    type: multipart-form
    data:
      - name: messaging_product
        type: text
        value: whatsapp
      - name: file
        type: file
        value:
          - /Users/sticker.webp
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Upload Sticker File (form-data)
    request:
      url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/media
      method: POST
      body:
        type: multipart-form
        data:
          - name: messaging_product
            type: text
            value: whatsapp
          - name: file
            type: file
            value:
              - /Users/sticker.webp
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: |-
          {
              "id": "<MEDIA_ID>"
          }
  - name: Upload Sticker File JSON
    request:
      url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/media
      method: POST
      headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: Bearer {{User-Access-Token}}
      body:
        type: json
        data: |-
          {
           
              "file": "@/local/path/file.webp;type=webp",
              "messaging_product": "whatsapp"    
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "id": "4490709327384033"
          }

docs: This request uploads a sticker as .webp. The parameters are specified as **form-data** in the request **body**.
