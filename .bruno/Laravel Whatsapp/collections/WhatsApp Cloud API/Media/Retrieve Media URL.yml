info:
  name: Retrieve Media URL
  type: http
  seq: 4

http:
  method: GET
  url: https://graph.facebook.com/{{Version}}/{{Media-ID}}?phone_number_id=<PHONE_NUMBER_ID>
  params:
    - name: phone_number_id
      value: <PHONE_NUMBER_ID>
      type: query
      description: Specifies that this action only be performed if the media belongs to the provided phone number.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Retrieve Media URL
    request:
      url: https://graph.facebook.com/{{Version}}/{{Media-ID}}?phone_number_id=<PHONE_NUMBER_ID>
      method: GET
      headers:
        - name: Authorization
          value: Bearer {{User-Access-Token}}
      params:
        - name: phone_number_id
          value: <PHONE_NUMBER_ID>
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "messaging_product": "whatsapp",
              "url": "<URL>",
              "mime_type": "image/jpeg",
              "sha256": "<HASH>",
              "file_size": "303833",
              "id": "2621233374848975"
          }

docs: |-
  To retrieve your media’s URL, make a **GET** call to **`/{{Media-ID}}`**. Use the returned URL to download the media file. Note that clicking this URL (i.e. performing a generic GET) will not return the media; you must include an access token. For more information, see [Download Media](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/media#download-media).

  You can also use the optional query **`?phone_number_id`** for **`Retrieve Media URL`** and **`Delete Media`**. This parameter checks to make sure the media belongs to the phone number before retrieval or deletion.

  #### Response

  A successful response includes an object with a media URL. The URL is only valid for 5 minutes. To use this URL, see [Download Media](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/media#download-media).
