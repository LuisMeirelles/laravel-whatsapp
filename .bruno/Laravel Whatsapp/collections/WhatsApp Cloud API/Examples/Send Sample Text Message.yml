info:
  name: Send Sample Text Message
  type: http
  seq: 1

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
  body:
    type: json
    data: |-
      {
          "messaging_product": "whatsapp",
          "to": "{{Recipient-WA-ID}}",
          "type": "template",
          "template": {
              "name": "hello_world",
              "language": {
                  "code": "en_US"
              }
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Send Sample Text message
    request:
      url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{User-Access-Token}}
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "messaging_product": "whatsapp",
              "recipient_type": "individual",
              "to": "16315555555",
              "type": "template",
              "template": {
                  "name": "template-name",
                  "language": {
                      "code": "language-and-locale-code"
                  },
                  "components": [
                      {
                          "type": "body",
                          "parameters": [
                              {
                                  "type": "text",
                                  "text": "text-string"
                              },
                              {
                                  "type": "currency",
                                  "currency": {
                                      "fallback_value": "$100.99",
                                      "code": "USD",
                                      "amount_1000": 100990
                                  }
                              },
                              {
                                  "type": "date_time",
                                  "date_time": {
                                      "fallback_value": "February 25, 1977",
                                      "day_of_week": 5,
                                      "year": 1977,
                                      "month": 2,
                                      "day_of_month": 25,
                                      "hour": 15,
                                      "minute": 33,
                                      "calendar": "GREGORIAN"
                                  }
                              }
                          ]
                      }
                  ]
              }
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "messaging_product": "whatsapp",
              "contacts": [
                  {
                      "input": "48XXXXXXXXX",
                      "wa_id": "48XXXXXXXXX "
                  }
              ],
              "messages": [
                  {
                      "id": "wamid.gBGGSFcCNEOPAgkO_KJ55r4w_ww"
                  }
              ]
          }

docs: |-
  You need to create a message template before you can send one. See [Create Template Using the WhatsApp Manager](https://developers.facebook.com/docs/whatsapp/message-templates/creation#step-1--create-template-using-the-whatsapp-manager) for more information. If your account is not verified yet, you can use one of our pre-approved templates.

  To send a text-based message template, make a **POST** call to **`/{{Phone-Number-ID}}/messages`** and attach a message object with type = `template`. Then, add a template object.

  ## Prerequisites
  - You need to create a message template through [WhatsApp Manager](https://developers.facebook.com/docs/whatsapp/message-templates/creation) or [BM API](https://developers.facebook.com/docs/whatsapp/business-management-api/message-templates#creating-message-templates)
  - For an unverified account, we have already [pre-created message templates](https://www.facebook.com/business/help/722393685250070) for you to use.

  ## Message Objects

  Message templates can contain the following `Message Objects`:

  * [Template Object](#fb5ad9b7-7991-443a-a1b5-97fdc5731673)
  * [Language Object](#d9272e38-c3db-458c-a23b-07953abc73a40)
  * [Component Object](#8225365a-acb8-48c7-8e57-079dfc532865)
  * [Parameter Object](#fe8db07c-27ad-49f3-bf33-472ee302c136)
  * [Currency Object](#424b70af-ced8-456d-b1e1-1360c5afb9e9)
  * [Date_Time Object](#ec955b05-7bd4-4273-ad87-ae755b580f6e)

  ## Response

  A successful response includes an object with an identifier prefixed with **`wamid`**.
