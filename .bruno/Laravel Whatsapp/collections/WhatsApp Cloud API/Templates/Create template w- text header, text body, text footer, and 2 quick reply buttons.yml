info:
  name: Create template w/ text header, text body, text footer, and 2 quick reply buttons
  type: http
  seq: 9

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/message_templates
  body:
    type: json
    data: |-
      {
          "name": "seasonal_promotion_text_only",
          "language": "en",
          "category": "MARKETING",
          "components": [
              {
                  "type": "HEADER",
                  "format": "TEXT",
                  "text": "Our {{1}} is on!",
                  "example": {
                      "header_text": [
                          "Summer Sale"
                      ]
                  }
              },
              {
                  "type": "BODY",
                  "text": "Shop now through {{1}} and use code {{2}} to get {{3}} off of all merchandise.",
                  "example": {
                      "body_text": [
                          [
                              "the end of August","25OFF","25%"
                          ]
                      ]
                  }
              },
              {
                  "type": "FOOTER",
                  "text": "Use the buttons below to manage your marketing subscriptions"
              },
              {
                  "type":"BUTTONS",
                  "buttons": [
                      {
                          "type": "QUICK_REPLY",
                          "text": "Unsubcribe from Promos"
                      },
                      {
                          "type":"QUICK_REPLY",
                          "text": "Unsubscribe from All"
                      }
                  ]
              }
          ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
