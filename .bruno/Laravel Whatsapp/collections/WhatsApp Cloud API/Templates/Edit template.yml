info:
  name: Edit template
  type: http
  seq: 13

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/<TEMPLATE_ID>
  body:
    type: json
    data: |-
      {
          "name": "2023_april_promo",
          "components": [
              {
                  "type": "HEADER",
                  "format": "TEXT",
                  "text": "Fall Sale"
              },
              {
                  "type": "BODY",
                  "text": "Hi {{1}}, our Fall Sale is on! Use promo code {{2}} Get an extra 25% off every order above $350!",
                  "example": {
                      "body_text": [
                          [
                              "Mark",
                              "FALL25"
                          ]
                      ]
                  }
              },
              {
                  "type": "FOOTER",
                  "text": "Not interested in any of our sales? Tap Stop Promotions"
              },
              {
                  "type": "BUTTONS",
                  "buttons": [
                      {
                          "type": "QUICK_REPLY",
                          "text": "Stop promotions"
                      }
                  ]
              }
          ],
          "language": "en_US",
          "category": "MARKETING"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

