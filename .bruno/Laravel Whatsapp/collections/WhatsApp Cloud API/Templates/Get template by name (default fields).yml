info:
  name: Get template by name (default fields)
  type: http
  seq: 2

http:
  method: GET
  url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/message_templates?name=<TEMPLATE_NAME>
  params:
    - name: name
      value: <TEMPLATE_NAME>
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Example response
    request:
      url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/message_templates?name=2023_april_promo
      method: GET
      params:
        - name: name
          value: 2023_april_promo
          type: query
