info:
  name: Create authentication template w/ OTP one-tap autofill button
  type: http
  seq: 6

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/message_templates
  body:
    type: json
    data: |-
      {
          "name": "authentication_code_autofill_button",
          "language": "en_US",
          "category": "AUTHENTICATION",
          "components": [
              {
                  "type": "BODY",
                  "add_security_recommendation": true
              },
              {
                  "type": "FOOTER",
                  "code_expiration_minutes": 10
              },
              {
                  "type": "BUTTONS",
                  "buttons": [
                      {
                          "type": "OTP",
                          "otp_type": "ONE_TAP",
                          "text": "Copy Code",
                          "autofill_text": "Autofill",
                          "package_name": "com.example.luckyshrub",
                          "signature_hash": "K8a%2FAINcGX7"
                      }
                  ]
              }
          ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

