info:
  name: Create multi-product message template
  type: http
  seq: 8

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/message_templates
  body:
    type: json
    data: |-
      {
          "name": "abandoned_cart",
          "language": "en_US",
          "category": "MARKETING",
          "components": [
              {
                  "type": "HEADER",
                  "format": "TEXT",
                  "text": "Forget something {{1}}?",
                  "example": {
                      "header_text": [
                          "Pablo"
                      ]
                  }
              },
              {
                  "type": "BODY",
                  "text": "Looks like you left some items in your cart! Use code {{1}} and you can get 10% off of all of them!",
                  "example": {
                      "body_text": [
                          [
                              "10OFF"
                          ]
                      ]
                  }
              },
              {
                  "type":"BUTTONS",
                  "buttons": [
                      {
                          "type": "MPM",
                          "text": "View items"
                      }
                  ]
              }
          ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

