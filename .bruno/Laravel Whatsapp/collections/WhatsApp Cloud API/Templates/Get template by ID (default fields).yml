info:
  name: Get template by ID (default fields)
  type: http
  seq: 1

http:
  method: GET
  url: https://graph.facebook.com/{{Version}}/<TEMPLATE_ID>
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

