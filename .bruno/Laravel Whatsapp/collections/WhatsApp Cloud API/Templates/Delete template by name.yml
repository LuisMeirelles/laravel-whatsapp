info:
  name: Delete template by name
  type: http
  seq: 14

http:
  method: DELETE
  url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/message_templates?name=<TEMPLATE_NAME>
  params:
    - name: name
      value: <TEMPLATE_NAME>
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

