info:
  name: Create template w/ location header, text body, text footer, and a website buttons
  type: http
  seq: 11

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/message_templates
  body:
    type: json
    data: |-
      {
          "name": "order_delivery_update",
          "language": "en_US",
          "category": "UTILITY",
          "components": [
              {
                  "type": "HEADER",
                  "format": "LOCATION"
              },
              {
                  "type": "BODY",
                  "text": "Good news {{1}}! Your order #{{2}} is on its way to the location above. Thank you for your order!",
                  "example": {
                      "body_text": [
                          [
                              "Mark",
                              "566701"
                          ]
                      ]
                  }
              },
              {
                  "type": "FOOTER",
                  "text": "To stop receiving delivery updates, tap the button below."
              },
              {
                  "type":"BUTTONS",
                  "buttons": [
                      {
                          "type": "QUICK_REPLY",
                          "text": "Stop Delivery Updates"
                      }
                  ]
              }
          ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

