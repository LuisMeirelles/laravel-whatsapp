info:
  name: Delete template by ID
  type: http
  seq: 15

http:
  method: DELETE
  url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/message_templates?hsm_id=<HSM_ID>&name=<NAME>
  params:
    - name: hsm_id
      value: <HSM_ID>
      type: query
      description: Template ID
    - name: name
      value: <NAME>
      type: query
      description: Template name
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

