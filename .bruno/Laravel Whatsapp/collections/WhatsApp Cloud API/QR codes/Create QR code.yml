info:
  name: Create QR code
  type: http
  seq: 6

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/message_qrdls
  body:
    type: json
    data: |-
      {
          "prefilled_message": "<PREFILLED_MESSAGE>",
          "generate_qr_image": "<GENERATE_QR_IMAGE>"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

