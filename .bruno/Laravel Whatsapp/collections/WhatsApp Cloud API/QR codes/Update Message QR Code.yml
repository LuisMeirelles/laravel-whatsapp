info:
  name: Update Message QR Code.
  type: http
  seq: 7

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/message_qrdls
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "prefilled_message": "<PREFILLED_MESSAGE>",
          "code": "<CODE>"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

