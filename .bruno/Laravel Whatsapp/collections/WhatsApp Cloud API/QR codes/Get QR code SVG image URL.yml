info:
  name: Get QR code SVG image URL
  type: http
  seq: 4

http:
  method: GET
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/message_qrdls?fields=prefilled_message,deep_link_url,qr_image_url.format(SVG)&code=<QR_CODE_ID>
  params:
    - name: fields
      value: prefilled_message,deep_link_url,qr_image_url.format(SVG)
      type: query
    - name: code
      value: <QR_CODE_ID>
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

