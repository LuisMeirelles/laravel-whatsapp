info:
  name: Get QR code
  type: http
  seq: 1

http:
  method: GET
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/message_qrdls/<QR_CODE_ID>
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

