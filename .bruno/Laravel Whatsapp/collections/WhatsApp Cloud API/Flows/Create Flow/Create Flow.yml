info:
  name: Create Flow
  type: http
  seq: 1

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/flows
  body:
    type: multipart-form
    data:
      - name: name
        type: text
        value: <FLOW_NAME>
      - name: categories
        type: text
        value: '["OTHER"]'
        description: |-
          A list of Flow categories. Multiple values are possible, but at least one is required. Choose the values which represent your business use case. 

          Possible values: "SIGN_UP", "SIGN_IN", "APPOINTMENT_BOOKING", "LEAD_GENERATION", "CONTACT_US", "CUSTOMER_SUPPORT", "SURVEY", "OTHER"
      - name: clone_flow_id
        type: text
        value: <EXISTING_FLOW_ID>
        description: Creates a copy of the existing flow specified
        disabled: true
      - name: endpoint_uri
        type: text
        value: https://example.com
        description: Endpoint URI for the Flow
        disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Create Flow
    request:
      url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/flows
      method: POST
      body:
        type: multipart-form
        data:
          - name: name
            type: text
            value: <FLOW_NAME>
          - name: categories
            type: text
            value: '["OTHER"]'
          - name: clone_flow_id
            type: text
            value: <EXISTING_FLOW_ID>
            disabled: true
          - name: endpoint_uri
            type: text
            value: https://example.com
            disabled: true
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: |-
          {
              "id": "flow-1"
          }

docs: |-
  Creates a new flow. To clone an existing flow you can add the parameter

  `"clone_flow_id": "original-flow-id"`
