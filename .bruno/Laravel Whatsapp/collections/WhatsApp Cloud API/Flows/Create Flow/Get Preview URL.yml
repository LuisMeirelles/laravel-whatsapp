info:
  name: Get Preview URL
  type: http
  seq: 4

http:
  method: GET
  url: https://graph.facebook.com/{{Version}}/{{Flow-ID}}?fields=preview.invalidate(false)
  params:
    - name: fields
      value: preview.invalidate(false)
      type: query
      description: Set to true to generate a new preview link and expire old link
    - name: date_format
      value: U
      type: query
      description: Returns date as unix timestamp in seconds
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Get Preview URL
    request:
      url: https://graph.facebook.com/{{Version}}/{{Flow-ID}}?fields=preview.invalidate(false)
      method: GET
      params:
        - name: fields
          value: preview.invalidate(false)
          type: query
          description: Set to true to generate a new preview link and expire old link
        - name: date_format
          value: U
          type: query
          description: Returns date as unix timestamp in seconds
          disabled: true
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: |-
          {
              "preview": {
                  "preview_url": "https://business.facebook.com/wa/manage/flows/550.../preview/?token=b9d6....",
                  "expires_at": "2023-05-21T11:18:09+0000"
              },
              "id": "flow-1"

          }

docs: |-
  Returns link to web page with preview of the flow. The link has an expiry time which is returned in the response. The same link will be returned as long as it's still valid, a new link will be generated when it expires.

  To generate a new link and invalidate the existing link, set

  `fields=preview.invalidate(true)`
