info:
  name: Send Draft Flow by ID
  type: http
  seq: 2

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
  body:
    type: json
    data: |-
      {
          "messaging_product": "whatsapp",
          "to": "{{Recipient-Phone-Number}}",
          "recipient_type": "individual",
          "type": "interactive",
          "interactive": {
              "type": "flow",
              "header": {
                  "type": "text",
                  "text": "Not shown in draft mode"
              },
              "body": {
                  "text": "Not shown in draft mode"
              },
              "footer": {
                  "text": "Not shown in draft mode"
              },
              "action": {
                  "name": "flow",
                  "parameters": {
                      "flow_message_version": "3",
                      "flow_action": "navigate",
                      "flow_token": "<FLOW_TOKEN>",
                      "flow_id": "{{Flow-ID}}",
                      "flow_cta": "Not shown in draft mode",
                      "mode": "draft",
                      "flow_action_payload": {
                          "screen": "<SCREEN_ID>",
                          "data": {
                              "<CUSTOM_KEY>": "<CUSTOM_VALUE>"
                          }
                      }
                  }
              }
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Send Draft Flow by ID
    request:
      url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
      method: POST
      body:
        type: json
        data: |-
          {
              "messaging_product": "whatsapp",
              "to": "{{Recipient-Phone-Number}}",
              "recipient_type": "individual",
              "type": "interactive",
              "interactive": {
                  "type": "flow",
                  "header": {
                      "type": "text",
                      "text": "Not shown in draft mode"
                  },
                  "body": {
                      "text": "Not shown in draft mode"
                  },
                  "footer": {
                      "text": "Not shown in draft mode"
                  },
                  "action": {
                      "name": "flow",
                      "parameters": {
                          "flow_message_version": "3",
                          "flow_action": "navigate",
                          "flow_token": "<FLOW_TOKEN>",
                          "flow_id": "{{Flow-ID}}",
                          "flow_cta": "Not shown in draft mode",
                          "mode": "draft",
                          "flow_action_payload": {
                              "screen": "<SCREEN_ID>",
                              "data": {
                                  "<CUSTOM_KEY>": "<CUSTOM_VALUE>"
                              }
                          }
                      }
                  }
              }
          }
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: |-
          {
              "messaging_product": "whatsapp",
              "contacts": [
                  {
                      "input": "18055555555",
                      "wa_id": "18055555555"
                  }
              ],
              "messages": [
                  {
                      "id": "wamid.HBgL..."
                  }
              ]
          }

docs: Flow messages won't be delivered to unsupported WhatsApp versions
