info:
  name: Update Flow JSON
  type: http
  seq: 1

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Flow-ID}}/assets
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value: []
      - name: name
        type: text
        value: flow.json
      - name: asset_type
        type: text
        value: FLOW_JSON
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Upload Flow JSON Asset
    request:
      url: https://graph.facebook.com/{{Version}}/{{Flow-ID}}/assets
      method: POST
      body:
        type: multipart-form
        data:
          - name: file
            type: file
            value: []
          - name: name
            type: text
            value: flow.json
          - name: asset_type
            type: text
            value: FLOW_JSON
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: |-
          {
              "success": true,
              "validation_errors": [
                  {
                      "error": "INVALID_PROPERTY",
                      "error_type": "JSON_SCHEMA_ERROR",
                      "message": "The property \"initial-text\" cannot be specified at \"$root/screens/0/layout/children/2/children/0\".",
                      "line_start": 46,
                      "line_end": 46,
                      "column_start": 17,
                      "column_end": 30
                  }
              ]
          }

docs: |-
  Used to upload a flow JSON file with the flow content. Refer to flow JSON documentation here [https://developers.facebook.com/docs/whatsapp/flows/reference/flowjson](https://developers.facebook.com/docs/whatsapp/flows/reference/flowjson)

  The file must be attached as from data. The response will include any validation errors in the JSON file
