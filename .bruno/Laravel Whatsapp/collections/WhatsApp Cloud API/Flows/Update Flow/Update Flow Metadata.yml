info:
  name: Update Flow Metadata
  type: http
  seq: 3

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Flow-ID}}
  body:
    type: multipart-form
    data:
      - name: name
        type: text
        value: <NEW_FLOW_NAME>
      - name: categories
        type: text
        value: '["OTHER"]'
        description: |-
          A list of Flow categories. Multiple values are possible, but at least one is required. Choose the values which represent your business use case. 

          Allowed values: "SIGN_UP", "SIGN_IN", "APPOINTMENT_BOOKING", "LEAD_GENERATION", "CONTACT_US", "CUSTOMER_SUPPORT", "SURVEY", "OTHER"
      - name: endpoint_uri
        type: text
        value: https://example.com
        description: Endpoint URI for the Flow
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Update Flow Metadata
    request:
      url: https://graph.facebook.com/{{Version}}/{{Flow-ID}}
      method: POST
      body:
        type: multipart-form
        data:
          - name: name
            type: text
            value: <NEW_FLOW_NAME>
          - name: categories
            type: text
            value: '["OTHER"]'
          - name: endpoint_uri
            type: text
            value: https://example.com
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: |-
          {
              "success": true
          }
