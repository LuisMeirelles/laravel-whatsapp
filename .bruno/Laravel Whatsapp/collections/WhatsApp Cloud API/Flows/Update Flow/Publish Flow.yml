info:
  name: Publish Flow
  type: http
  seq: 2

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Flow-ID}}/publish
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Publish Flow
    request:
      url: https://graph.facebook.com/{{Version}}/{{Flow-ID}}/publish
      method: POST
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: |-
          {
              "success": true
          }

docs: Updates the status of the flow as "PUBLISHED". This action is not reversible. The flow and its assets become immutable once published. To update the flow, you must create a new flow and specify the previous flow id as the \`clone_flow_id\` parameter
