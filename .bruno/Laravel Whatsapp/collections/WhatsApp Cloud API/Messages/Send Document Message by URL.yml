info:
  name: Send Document Message by URL
  type: http
  seq: 16

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "messaging_product": "whatsapp",
          "recipient_type": "individual",
          "to": "{{Recipient-Phone-Number}}",
          "type": "document",
          "document": {
              "link": "<http(s)://document-url>",
              "caption": "<DOCUMENT_CAPTION_TEXT>"
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Send Document Message by URL
    request:
      url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{User-Access-Token}}
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "messaging_product": "whatsapp",
              "recipient_type": "individual",
              "to": "{{Recipient-Phone-Number}}",
              "type": "document",
              "document": {
                  "link": "<http(s)://document-url>",
                  "caption": "<DOCUMENT-CAPTION-TEXT>"
              }
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "messaging_product": "whatsapp",
              "contacts": [
                  {
                      "input": "48XXXXXXXXX",
                      "wa_id": "48XXXXXXXXX "
                  }
              ],
              "messages": [
                  {
                      "id": "wamid.gBGGSFcCNEOPAgkO_KJ55r4w_ww"
                  }
              ]
          }

docs: |-
  To send a media message, make a **POST** call to **`/{{Phone-Number-ID}}/messages`** and attach a message object with type = `document`. Then, include the link to the document.

  For more information about the `Media Object` structure, see [Media Object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#media-object).

  Send a document message to your customers using link.

  ## Response

  A successful response includes an object with an identifier prefixed with **`wamid`**. Use the ID listed after **`wamid`** to track your message status.
