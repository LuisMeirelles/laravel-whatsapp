info:
  name: Send Reply to Image Message by ID
  type: http
  seq: 7

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "messaging_product": "whatsapp",
          "recipient_type": "individual",
          "to": "{{Recipient-Phone-Number}}",
          "context": {
              "message_id": "<MSGID_OF_PREV_MSG>"
          },
          "type": "image",
          "image": {
              "id": "<IMAGE_OBJECT_ID>"
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Send Reply to Image Message by ID
    request:
      url: http://
      method: GET
      headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: Bearer {{User-Access-Token}}
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "messaging_product": "whatsapp",
              "contacts": [
                  {
                      "input": "48XXXXXXXXX",
                      "wa_id": "48XXXXXXXXX "
                  }
              ],
              "messages": [
                  {
                      "id": "wamid.gBGGSFcCNEOPAgkO_KJ55r4w_ww"
                  }
              ]
          }

docs: |-
  To send a reply-to image message, make a **POST** call to **`/{{Phone-Number-ID}}/messages`** and attach a message object with type = `image`. Add the `image.id` of the image. 

  Assign **`context.message_id`** the message id of the message you want to reply to.

  ## Request Parameters

  | Parameter | Description |
  |---|---|
  | **`messaging_product`** | **Required**<br/>Messaging service used for the request. Use `"whatsapp"`.
  | **`context.message_id`** | **Required for context object**<br/>Specifies the ID of the message being replied to. |
  | **`type`** | **Required**<br/> Specifies the media type. Use "image".|
  | **`image.id`** | Specifies the ID of the image you are replying to. |

  For more information about the `Media Object` structure, see [Media Object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#media-object).

  ## Response

  A successful response includes an object with an identifier prefixed with **`wamid`**. Use the ID listed after **`wamid`** to track your message status.
