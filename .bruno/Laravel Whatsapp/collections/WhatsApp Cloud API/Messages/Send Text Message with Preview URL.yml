info:
  name: Send Text Message with Preview URL
  type: http
  seq: 4

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "messaging_product": "whatsapp",
          "to": "{{Recipient-Phone-Number}}",
          "text": {
              "preview_url": true,
              "body": "Please visit https://youtu.be/hpltvTEiRrY to inspire your day!"
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Send Text Message with Preview URL
    request:
      url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
      method: POST
      headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: Bearer {{User-Access-Token}}
      body:
        type: json
        data: |-
          {
              "messaging_product": "whatsapp",
              "to": "{{Recipient-Phone-Number}}",
              "text": {
                  "preview_url": true,
                  "body": "Please visit https://youtu.be/hpltvTEiRrY."
              }
          }
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "messaging_product": "whatsapp",
            "contacts": [{
                "input": "15555551234",
                "wa_id": "<WHATSAPP_ID>"
              }],
            "messages": [{
                "id": "wamid.ID"
              }]
          }
