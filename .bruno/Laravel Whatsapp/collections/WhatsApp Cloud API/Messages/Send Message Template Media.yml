info:
  name: Send Message Template Media
  type: http
  seq: 31

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "messaging_product": "whatsapp",
          "recipient_type": "individual",
          "to": "{{Recipient-Phone-Number}}",
          "type": "template",
          "template": {
              "name": "template-name",
              "language": {
                  "code": "language-and-locale-code"
              },
              "components": [
                  {
                      "type": "header",
                      "parameters": [
                          {
                              "type": "image",
                              "image": {
                                  "link": "http(s)://the-image-url"
                              }
                          }
                      ]
                  },
                  {
                      "type": "body",
                      "parameters": [
                          {
                              "type": "text",
                              "text": "text-string"
                          },
                          {
                              "type": "currency",
                              "currency": {
                                  "fallback_value": "$100.99",
                                  "code": "USD",
                                  "amount_1000": 100990
                              }
                          },
                          {
                              "type": "date_time",
                              "date_time": {
                                  "fallback_value": "February 25, 1977",
                                  "day_of_week": 5,
                                  "year": 1977,
                                  "month": 2,
                                  "day_of_month": 25,
                                  "hour": 15,
                                  "minute": 33,
                                  "calendar": "GREGORIAN"
                              }
                          }
                      ]
                  }
              ]
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Send Message Template Media
    request:
      url: https://graph.facebook.com/v13.0/{{Phone-Number-ID}}/messages
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{User-Access-Token}}
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "messaging_product": "whatsapp",
              "recipient_type": "individual",
              "to": "{{Recipient-Phone-Number}}",
