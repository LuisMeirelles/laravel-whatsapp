info:
  name: Send Image Message by ID
  type: http
  seq: 6

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "messaging_product": "whatsapp",
          "recipient_type": "individual",
          "to": "{{Recipient-Phone-Number}}",
          "type": "image",
          "image": {
              "id": "<IMAGE_OBJECT_ID>"
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Send Image Message by ID
    request:
      url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{User-Access-Token}}
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "messaging_product": "whatsapp",
              "recipient_type": "individual",
              "to": "{{Recipient-Phone-Number}}",
              "type": "image",
              "image": {
                  "id": "<IMAGE_OBJECT_ID>"
              }
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |
          {
              "messaging_product": "whatsapp",
              "contacts": [
                  {
                      "input": "48XXXXXXXXX",
                      "wa_id": "48XXXXXXXXX "
                  }
              ],
              "messages": [
                  {
                      "id": "wamid.gBGGSFcCNEOPAgkO_KJ55r4w_ww"
                  }
              ]
          }

docs: |-
  To send a reply to an image message, make a **POST** call to **`/{{Phone-Number-ID}}/messages`** and attach a message object with type = `image`. Then add a corresponding `image object`.

  Send an image message to your customers using link or media ID uploaded from media endpoint.

  ## Response

  A successful response includes an object with an identifier prefixed with **`wamid`**. Use the ID listed after **`wamid`** to track your message status.
