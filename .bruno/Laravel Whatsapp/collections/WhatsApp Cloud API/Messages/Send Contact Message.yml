info:
  name: Send Contact Message
  type: http
  seq: 26

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "messaging_product": "whatsapp",
          "to": "{{Recipient-Phone-Number}}",
          "type": "contacts",
          "contacts": [
              {
                  "addresses": [
                      {
                          "street": "<ADDRESS_STREET>",
                          "city": "<ADDRESS_CITY>",
                          "state": "<ADDRESS_STATE>",
                          "zip": "<ADDRESS_ZIP>",
                          "country": "<ADDRESS_COUNTRY>",
                          "country_code": "<ADDRESS_COUNTRY_CODE>",
                          "type": "<HOME|WORK>"
                      }
                  ],
                  "birthday": "<CONTACT_BIRTHDAY>",
                  "emails": [
                      {
                          "email": "<CONTACT_EMAIL>",
                          "type": "<WORK|HOME>"
                      }
                  ],
                  "name": {
                      "formatted_name": "<CONTACT_FORMATTED_NAME>",
                      "first_name": "<CONTACT_FIRST_NAME>",
                      "last_name": "<CONTACT_LAST_NAME>",
                      "middle_name": "<CONTACT_MIDDLE_NAME>",
                      "suffix": "<CONTACT_SUFFIX>",
                      "prefix": "<CONTACT_PREFIX>"
                  },
                  "org": {
                      "company": "<CONTACT_ORG_COMPANY>",
                      "department": "<CONTACT_ORG_DEPARTMENT>",
                      "title": "<CONTACT_ORG_TITLE>"
                  },
                  "phones": [
                      {
                          "phone": "<CONTACT_PHONE>",
                          "wa_id": "<CONTACT_WA_ID>",
                          "type": "<HOME|WORK>"
                      }
                  ],
                  "urls": [
                      {
                          "url": "<CONTACT_URL>",
                          "type": "<HOME|WORK>"
                      }
                  ]
              }
          ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Send Contact Message
    request:
      url: https://graph.facebook.com/v13.0/{{Phone-Number-ID}}/messages
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{User-Access-Token}}
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "messaging_product": "whatsapp",
              "to": "{{Recipient-Phone-Number}}",
              "type": "contacts",
              "contacts": [
                  {
                      "addresses": [
                          {
                              "street": "1 Hacker Way",
                              "city": "Menlo Park",
                              "state": "CA",
                              "zip": "94025",
                              "country": "United States",
                              "country_code": "us",
                              "type": "HOME"
                          },
                          {
                              "street": "200 Jefferson Dr",
                              "city": "Menlo Park",
                              "state": "CA",
                              "zip": "94025",
                              "country": "United States",
                              "country_code": "us",
                              "type": "WORK"
                          }
                      ],
                      "birthday": "2012-08-18",
                      "emails": [
                          {
                              "email": "test@fb.com",
                              "type": "WORK"
                          },
                          {
                              "email": "test@whatsapp.com",
                              "type": "HOME"
                          }
                      ],
                      "name": {
                          "formatted_name": "John Smith",
                          "first_name": "John",
                          "last_name": "Smith",
                          "middle_name": "D.",
                          "suffix": "Jr",
                          "prefix": "Dr"
                      },
                      "org": {
                          "company": "WhatsApp",
                          "department": "Design",
                          "title": "Manager"
                      },
                      "phones": [
                          {
                              "phone": "+1 (940) 555-1234",
                              "type": "HOME"
                          },
                          {
                              "phone": "+1 (650) 555-1234",
                              "type": "WORK",
                              "wa_id": "16505551234"
                          }
                      ],
                      "urls": [
                          {
                              "url": "https://www.facebook.com",
                              "type": "WORK"
                          },
                          {
                              "url": "https://www.whatsapp.com",
                              "type": "HOME"
                          }
                      ]
                  }
              ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "messaging_product": "whatsapp",
              "contacts": [
                  {
                      "input": "48XXXXXXXXX",
                      "wa_id": "48XXXXXXXXX "
                  }
              ],
              "messages": [
                  {
                      "id": "wamid.gBGGSFcCNEOPAgkO_KJ55r4w_ww"
                  }
              ]
          }

docs: |-
  To send contact messages, make a **POST** call to **`/{{Phone-Number-ID}}/messages`** and attach a message object with type: **`contact`**. Then, add a [contacts object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#contacts-object).

  ## Response

  A successful response includes an object with an identifier prefixed with **`wamid`**.
