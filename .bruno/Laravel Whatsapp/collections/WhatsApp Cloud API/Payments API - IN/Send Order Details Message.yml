info:
  name: Send Order Details Message
  type: http
  seq: 1

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
  body:
    type: json
    data: |-
      {
          "messaging_product": "whatsapp",
          "recipient_type": "individual",
          "to": "{{Recipient-WA-Phone-Number}}",
          "type": "interactive",
          "interactive": {
              "type": "order_details",
              "header": {
                  "type": "image",
                  "image": {
                      "link": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Home_made_sour_dough_bread.jpg/640px-Home_made_sour_dough_bread.jpg"
                  }
              },
              "body": {
                  "text": "your-text-body-content"
              },
              "footer": {
                  "text": "your-text-footer-content"
              },
              "action": {
                  "name": "review_and_pay",
                  "parameters": {
                      "reference_id": "unique-reference-id",
                      "type": "digital-goods",
                      "payment_type": "upi",
                      "payment_configuration": "my-payment-config-name",
                      "currency": "INR",
                      "total_amount": {
                          "value": 1100,
                          "offset": 100
                      },
                      "order": {
                          "status": "pending",
                          "items": [
                              {
                                  "retailer_id": "1234567",
                                  "name": "bread",
                                  "amount": {
                                      "value": 1500,
                                      "offset": 100
                                  },
                                  "sale_amount": {
                                      "value": 1000,
                                      "offset": 100
                                  },
                                  "quantity": 1
                              }
                          ],
                          "subtotal": {
                              "value": 1000,
                              "offset": 100
                          },
                          "tax": {
                              "value": 100,
                              "offset": 100,
                              "description": "optional_text"
                          },
                          "shipping": {
                              "value": 100,
                              "offset": 100,
                              "description": "optional_text"
                          },
                          "discount": {
                              "value": 100,
                              "offset": 100,
                              "description": "optional_text",
                              "discount_program_name": "optional_text"
                          }
                      }
                  }
              }
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
