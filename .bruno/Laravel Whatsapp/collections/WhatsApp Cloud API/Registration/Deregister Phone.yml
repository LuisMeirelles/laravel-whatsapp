info:
  name: Deregister Phone
  type: http
  seq: 2

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/deregister
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Deregister Phone
    request:
      url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/deregister
      method: POST
      headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: Bearer {{User-Access-Token}}
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "success": true
          }

docs: |-
  To deregister your phone, make a **POST** call to **`{{Phone-Number-ID}}/deregister`**. **Deregister Phone** removes a previously registered phone. You can always re-register your phone using by repeating the registration process.

  #### Response

  A successful response returns:

  ``` json
  {
      "success": true
  }

  ```
