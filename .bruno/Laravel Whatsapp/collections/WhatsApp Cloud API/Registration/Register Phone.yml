info:
  name: Register Phone
  type: http
  seq: 1

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/register
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "messaging_product": "whatsapp",
          "pin": "<your-6-digit-pin>"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Register Phone
    request:
      url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/register
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{User-Access-Token}}
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "messaging_product": "whatsapp",
              "pin": "123456"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "success": true
          }

docs: |-
  To register your phone, make a **POST** call to **`/{{Phone-Number-ID}}/register`**. You need to include the following parameters.

  ## Request Parameters

  | Name                    | Description              |
  |-------------------------|--------------------------|
  | **`messaging_product`** | **Required**.<br/>The messaging service used. This value always needs to be set to `"whatsapp"`. |
  | **`pin`**               | **Required**.<br/>A 6-digit pin you previously set up. For more information, see [Set Two-Step Verification](#08c441cc-8837-4ce5-8e0d-73fb0125c323). |
