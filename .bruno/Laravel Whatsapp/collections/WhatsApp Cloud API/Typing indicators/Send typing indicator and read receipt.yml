info:
  name: Send typing indicator and read receipt
  type: http
  seq: 1

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
  body:
    type: json
    data: |-
      {
          "messaging_product": "whatsapp",
          "status": "read",
          "message_id": "<WHATSAPP_MESSAGE_ID>",
          "typing_indicator": {
              "type": "text"
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

