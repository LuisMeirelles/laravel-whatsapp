info:
  name: Block user(s)
  type: http
  seq: 2

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/block_users
  body:
    type: json
    data: |-
      {
          "messaging_product": "whatsapp",
          "block_users": [
              {
                  "user": "{{Recipient-Phone-Number}}"
              }
          ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

