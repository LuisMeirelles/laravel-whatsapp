docs: A Product Enquiry Message is received when a user is asking for more information about a specific product. These can be received as in two scenarios:<ol><li>When a customer replies to Single or Multi-Product Messages</li><li>When a customer accesses a business’ catalog through another entry point, navigates to a **Product Details Page**, and clicks **Message Business about this Product**.</li></ol>
