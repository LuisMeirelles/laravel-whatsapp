info:
  name: Override Callback URL
  type: http
  seq: 5

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/subscribed_apps
  headers:
    - name: Authorization
      value: Bearer {{User-Access-Token}}
  body:
    type: json
    data: |-
      {
        "override_callback_uri": "<ALTERNATE_WEBHOOK_ENDPOINT_URL>",
        "verify_token": "<ALTERNATE_WEBOOK_ENDPOINT_VERIFICATION_TOKEN>"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Override Callback URL
    request:
      url: https://graph.facebook.com/v15.0/{{WABA-ID}}/subscribed_apps
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{User-Access-Token}}
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "override_callback_uri": "https://alternate-endpoint-callback.com/webhook",
              "verify_token": "myvoiceismypassport?"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "data" : [
              {
                "override_callback_uri" : "https://alternate-endpoint-callback.com/webhook",
                "whatsapp_business_api_data" : {
                  "id" : "670843887433847",
                  "link" : "https://www.facebook.com/games/?app_id=67084...",
                  "name" : "Jaspers Market"
                }
              }
            ]
          }

docs: |-
  If you want to subscribe to Webhooks for multiple WhatsApp Business Accounts but want messages field Webhooks notifications to be sent to different callback URLs for each WABA, you can override the callback URL when subscribing to Webhooks for each WABA.

  To do this, first verify that the alternate Webhook endpoint can receive and process Webhooks notifications. Then, subscribe to Webhooks for the WABA as your normally would, but include the alternate endpoint's callback URL along with its verification token as a JSON payload:


  For more information, see [Overriding the Callback URL](https://developers.facebook.com/docs/whatsapp/embedded-signup/webhooks#overriding-the-callback-url).
