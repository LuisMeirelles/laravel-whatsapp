info:
  name: Get All Subscriptions for a WABA
  type: http
  seq: 3

http:
  method: GET
  url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/subscribed_apps
  headers:
    - name: Authorization
      value: Bearer {{User-Access-Token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Get All Subscriptions for a WABA
    request:
      url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/subscribed_apps
      method: GET
      headers:
        - name: Authorization
          value: Bearer {{User-Access-Token}}
        - name: Content-Type
          value: application/json
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |
          {
              "data": [
                  {
                      "whatsapp_business_api_data": {
                          "link": "<APP1_LINK>",
                          "name": "<APP1_NAME>",
                          "id": "7234002551525653"
                      }
                  },
                  {
                      "whatsapp_business_api_data": {
                          "link": "<APP2_LINK>",
                          "name": "<APP2_LINK>",
                          "id": "3736565603394103"
                      }
                  }
              ]
          }

docs: "To get a list of apps subscribed to Webhooks for a WABA, send a **GET** request to the **`subscribed_apps`** endpoint on the WABA:"
