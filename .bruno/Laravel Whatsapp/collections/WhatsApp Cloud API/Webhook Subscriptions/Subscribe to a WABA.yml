info:
  name: Subscribe to a WABA
  type: http
  seq: 2

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/subscribed_apps
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Subscribe to a WABA
    request:
      url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/subscribed_apps
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{User-Access-Token}}
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "success": true
          }

docs: Subscribe an app to a WhatsApp Business Account. For more information about subscribing to a WhatsApp Business Account, see [Subscribe to a WhatsApp Business Account](https://developers.facebook.com/docs/whatsapp/embedded-signup/webhooks#subscribe-to-a-whatsapp-business-account).
