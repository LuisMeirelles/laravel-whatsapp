info:
  name: Unsubscribe from a WABA
  type: http
  seq: 4

http:
  method: DELETE
  url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/subscribed_apps
  headers:
    - name: Authorization
      value: Bearer {{User-Access-Token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Unsubscribe from a WABA
    request:
      url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/subscribed_apps
      method: DELETE
      headers:
        - name: Authorization
          value: Bearer {{User-Access-Token}}
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "success": true
          }

docs: To unsubscribe your app from webhooks for a WhatsApp Business Account, send a **DELETE** request to the `/subscribed_apps/` endpoint on the WABA.
