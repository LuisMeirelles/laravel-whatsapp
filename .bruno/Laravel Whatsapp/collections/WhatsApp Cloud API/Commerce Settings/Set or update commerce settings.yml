info:
  name: Set or update commerce settings
  type: http
  seq: 2

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/whatsapp_commerce_settings?is_cart_enabled=true&is_catalog_visible=true
  params:
    - name: is_cart_enabled
      value: "true"
      type: query
    - name: is_catalog_visible
      value: "true"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
