info:
  name: Send Order Status Message
  type: http
  seq: 2

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
  body:
    type: json
    data: |-
      {
          "messaging_product": "whatsapp",
          "recipient_type": "individual",
          "to": "{{Recipient-WA-ID}}",
          "type": "interactive",
          "interactive": {
              "type": "order_status",
              "body": {
                  "text": "your-text-body-content"
              },
              "action": {
                  "name": "review_order",
                  "parameters": {
                      "reference_id": "unique-reference-id-from-order-details-msg",
                      "order": {
                          "status": "processing",
                          "description": "optional-text"
                      }
                  }
              }
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Send Order Status Message
    request:
      url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
      method: POST
      headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: Bearer {{User-Access-Token}}
      body:
        type: json
        data: |-
          {
              "messaging_product": "whatsapp",
              "recipient_type": "individual",
              "to": "{{Recipient-WA-ID}}",
              "type": "interactive",
              "interactive": {
                  "type": "order_status",
                  "body": {
                      "text": "your-text-body-content"
                  },
                  "action": {
                      "name": "review_order",
                      "parameters": {
                          "reference_id": "same-reference-id-from-order-details-msg",
                          "order": {
                              "status": "processing",
                              "description": "optional-text"
                          }
                      }
                  }
              }
          }
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "messaging_product": "whatsapp",
              "contacts": [
                  {
                      "input": "+1-631-555-5555",
                      "wa_id": "16315555555"
                  }
              ],
              "messages": [
                  {
                      "id": "wamid.gBGGFlaCGg0xcvAdgmZ9plHrf2Mh-o"
                  }
              ]
          }

docs: "Guide: [Payments API - SG](https://developers.facebook.com/docs/whatsapp/cloud-api/payments-api/payments-sg)"
