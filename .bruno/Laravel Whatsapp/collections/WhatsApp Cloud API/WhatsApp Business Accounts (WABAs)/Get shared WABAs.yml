info:
  name: Get shared WABAs
  type: http
  seq: 3

http:
  method: GET
  url: https://graph.facebook.com/{{Version}}/{{Business-ID}}/client_whatsapp_business_accounts
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

