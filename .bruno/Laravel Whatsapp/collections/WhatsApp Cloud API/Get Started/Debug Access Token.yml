info:
  name: Debug Access Token
  type: http
  seq: 5

http:
  method: GET
  url: https://graph.facebook.com/{{Version}}/debug_token?input_token={{User-Access-Token}}
  params:
    - name: input_token
      value: "{{User-Access-Token}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
