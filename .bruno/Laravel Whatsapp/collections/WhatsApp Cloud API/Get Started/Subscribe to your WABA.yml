info:
  name: Subscribe to your WABA
  type: http
  seq: 1

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/subscribed_apps
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Subscribe to your WABA
    request:
      url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/subscribed_apps
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{User-Access-Token}}
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "success": "true"
          }

docs: |-
  To make sure you receive notifications for your account you need to subscribe your app to your WABA.

  #### Response

  If your request is successful, all Webhook events for the phone numbers under this account are sent to your configured Webhooks endpoint.
