info:
  name: Set Two-Step Verification Code
  type: http
  seq: 7

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "pin": "<6-digit-pin>"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Set Two-Step Verification Code
    request:
      url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{User-Access-Token}}
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "pin": "123456"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": true
          }

docs: |-
  You can use this endpoint to change two-step verification code associated with your account. 
  After you change the verification code, future requests like changing the name, must use the new code. 

  **You set up two-factor verification and [register a phone number](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/registration#register-phone) in the same API call.**

  You must use the parameters listed below to change two-step verification 


  ## Parameters

  | Name          |  Description   |
  |-------------- |--------------- |
  | **`pin`**   | **Required**.<br/> A 6-digit PIN you want to use for two-step verification. |
