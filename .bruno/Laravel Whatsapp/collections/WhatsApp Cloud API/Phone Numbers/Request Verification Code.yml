info:
  name: Request Verification Code
  type: http
  seq: 5

http:
  method: POST
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/request_code
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{User-Access-Token}}
  body:
    type: json
    data: |-
      {
          "code_method": "SMS",
          "locale": "en_US"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Request Verification Code
    request:
      url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/request_code
      method: POST
      headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: Bearer {{User-Access-Token}}
      body:
        type: json
        data: |-
          {
              "code_method": "SMS",
              "locale": "en_US"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "success": true
          }

docs: |-
  You need to verify the phone number you want to use to send messages to your customers. Phone numbers must be verified through SMS/voice call. The verification process can be done through the Graph API calls specified below.
      

  To verify a phone number using Graph API, make a **POST** request to **`{{PHONE_NUMBER_ID}}/request_code`**. In your call, include your chosen verification method and locale. You need to authenticate yourself using **{{User-Access-Token}}** (This is automatically done for you in the **`Request Verification Code`** request).

  #### Request Parameters

  | Name                  | Description                 |
  |-----------------------|-----------------------------|
  | **`code_method`**         | **Required**.<br/>Specifies the method for verification. Supported options are: `SMS` or `VOICE`.  |
  | **`locale`**         | **Required**.<br/>Specifies your locale. For instance: `"en_US"`.  |

  #### Response

  After a successful call to **`Request Verification Code`**, you will receive your verification code via the method you selected in **`code_method`**. To finish the verification process, you need to use the [**`Verify Code`**](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/phone-numbers#verify) request.
