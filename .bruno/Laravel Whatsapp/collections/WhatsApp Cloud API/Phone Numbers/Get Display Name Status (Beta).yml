info:
  name: Get Display Name Status (Beta)
  type: http
  seq: 3

http:
  method: GET
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}?fields=name_status
  params:
    - name: fields
      value: name_status
      type: query
      description: |-
        The status of a display name associated with a specific phone number. The **`name_status`** value can be one of the following:

        * `APPROVED`: The name has been approved. You can download your certificate now.
        * `AVAILABLE_WITHOUT_REVIEW`: The certificate for the phone is available and display name is ready to use without review.
        * `DECLINED`: The name has not been approved. You cannot download your certificate.
        * `EXPIRED`: Your certificate has expired and can no longer be downloaded.
        * `PENDING_REVIEW`: Your name request is under review. You cannot download your certificate.
        NONE: No certificate is available.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Get Display Name Status (Beta)
    request:
      url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}?fields=name_status
      method: GET
      params:
        - name: fields
          value: name_status
          type: query
          description: |-
            The status of a display name associated with a specific phone number. The **`name_status`** value can be one of the following:

            * `APPROVED`: The name has been approved. You can download your certificate now.
            * `AVAILABLE_WITHOUT_REVIEW`: The certificate for the phone is available and display name is ready to use without review.
            * `DECLINED`: The name has not been approved. You cannot download your certificate.
            * `EXPIRED`: Your certificate has expired and can no longer be downloaded.
            * `PENDING_REVIEW`: Your name request is under review. You cannot download your certificate.
            NONE: No certificate is available.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id" : "105954558954427",
            "name_status" : "AVAILABLE_WITHOUT_REVIEW"
          }

docs: Include **`fields=name_status`** as a query string parameter to get the status of a display name associated with a specific phone number. This field is currently in beta and not available to all developers.
